services:
  - type: web
    name: needs-two-server
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build -w shared && npm run build -w server
    startCommand: npm run start -w server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: CLIENT_ORIGIN
        value: https://notzwed.github.io